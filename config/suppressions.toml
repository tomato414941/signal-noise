# alpha-os suppression registry
# This file is the committed source of truth for long-lived scheduler suppressions.

[[rules]]
selectors = ["gdelt_doc_*"]
match = "glob"
scopes = ["alpha-os"]
reason_code = "upstream_unstable"
detail = "GDELT document search times out or fails frequently from alpha-os."
review_after = "2026-04-01"

